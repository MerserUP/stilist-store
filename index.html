    color: var(--ink-dim);
    letter-spacing: 0.3px;
  }

  .link-arrow {
    flex: none;
    color: var(--ink-faint);
    transition: transform 0.35s var(--ease-out), color 0.35s var(--ease-out);
  }
  .link-card:hover .link-arrow,
  .link-card:focus-visible .link-arrow {
    transform: translateX(4px);
    color: var(--fx-bright);
  }
  .link-arrow svg { width: 18px; height: 18px; display: block; }

  /* карточка-акцент — сочная фуксия с глянцем */
  .link-card.featured {
    background: linear-gradient(140deg, #f75fa8, #d62d87 55%, #9c1a66);
    background-size: 180% 180%;
    border-color: rgba(255, 255, 255, 0.18);
    box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4), 0 6px 24px rgba(214, 45, 135, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.25);
    animation: featured-flow 8s ease-in-out infinite alternate;
  }
  @keyframes featured-flow {
    from { background-position: 0% 30%; }
    to   { background-position: 100% 70%; }
  }
  .link-card.featured .link-title { color: #fff; }
  .link-card.featured .link-sub { color: rgba(255, 255, 255, 0.85); }
  .link-card.featured .link-icon {
    background: rgba(255, 255, 255, 0.18);
    border-color: rgba(255, 255, 255, 0.4);
    color: #fff;
  }
  .link-card.featured .link-arrow { color: rgba(255, 255, 255, 0.8); }
  .link-card.featured:hover .link-arrow { color: #fff; }
  .link-card.featured:hover {
    background: linear-gradient(140deg, #ff6fb2, #e23590 55%, #a71e6d);
    background-size: 180% 180%;
    box-shadow: 0 16px 40px rgba(0, 0, 0, 0.45), 0 10px 30px rgba(214, 45, 135, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.28);
  }

  /* ---------- филиалы ---------- */
  .branches {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 14px;
    list-style: none;
  }
  .branch-card {
    padding: 18px;
    border-radius: 20px;
    background: var(--card);
    border: 1.5px solid var(--card-border);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    box-shadow:
      0 10px 30px rgba(0, 0, 0, 0.4),
      inset 0 1px 0 rgba(255, 255, 255, 0.1);
  }
  .branch-head {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .branch-pin {
    flex: none;
    width: 34px;
    height: 34px;
    border-radius: 12px;
    display: grid;
    place-items: center;
    background: rgba(255, 255, 255, 0.12);
    border: 1px solid rgba(255, 255, 255, 0.28);
    color: #ffffff;
  }
  .branch-pin svg { width: 17px; height: 17px; }
  .branch-name {
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 0.1px;
  }
  .branch-address {
    margin-top: 2px;
    font-size: 12.5px;
    font-weight: 500;
    color: var(--ink-dim);
  }
  .branch-actions {
    margin-top: 13px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  /* главный филиал — крупнее и с фирменным акцентом */
  .branch-card.featured {
    padding: 24px 20px;
    background: linear-gradient(150deg, rgba(247, 95, 168, 0.16), rgba(255, 255, 255, 0.07));
    border-color: rgba(247, 95, 168, 0.45);
  }
  .branch-card.featured .branch-name { font-size: 18px; }
  .branch-card.featured .branch-address { font-size: 13.5px; }
  .branch-card.featured .branch-pin {
    width: 42px;
    height: 42px;
    background: linear-gradient(140deg, #f75fa8, #c22579);
    border-color: transparent;
  }
  .branch-card.featured .branch-pin svg { width: 20px; height: 20px; }
  .branch-card.featured .branch-actions { margin-top: 16px; }
  .branch-card.featured .chip { padding: 11px 16px; font-size: 13.5px; }

  .chip {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 9px 14px;
    border-radius: 999px;
    font-size: 12.5px;
    font-weight: 700;
    letter-spacing: 0.3px;
    text-decoration: none;
    transition: transform 0.25s var(--ease-out), box-shadow 0.25s var(--ease-out), background 0.25s var(--ease-out);
  }
  .chip svg { width: 14px; height: 14px; }
  .chip:hover { transform: translateY(-2px); }
  .chip:active { transform: translateY(0) scale(0.98); }
  .chip-map {
    background: linear-gradient(140deg, #f75fa8, #c22579);
    color: #fff;
    box-shadow: 0 5px 16px rgba(214, 45, 135, 0.3);
  }
  .chip-map:hover { box-shadow: 0 8px 22px rgba(214, 45, 135, 0.4); }
  .chip-phone {
    background: rgba(255, 255, 255, 0.12);
    border: 1px solid rgba(255, 255, 255, 0.32);
    color: #ffffff;
  }
  .chip-phone:hover { background: rgba(255, 255, 255, 0.2); box-shadow: 0 6px 18px rgba(0, 0, 0, 0.3); }

  /* ---------- бегущая строка ---------- */
  .marquee {
    width: 100vw;
    margin: 34px 0 6px;
    padding: 13px 0;
    border-top: 1.5px solid rgba(255, 138, 196, 0.2);
    border-bottom: 1.5px solid rgba(255, 138, 196, 0.2);
    overflow: hidden;
    -webkit-mask-image: linear-gradient(90deg, transparent, #000 12%, #000 88%, transparent);
    mask-image: linear-gradient(90deg, transparent, #000 12%, #000 88%, transparent);
  }
  .marquee-track {
    display: flex;
    gap: 34px;
    width: max-content;
    animation: marquee 26s linear infinite;
  }
  .marquee-track span {
    font-weight: 700;
    font-size: 12.5px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--ink-faint);
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 34px;
  }
  .marquee-track i {
    font-style: normal;
    color: var(--fx);
    font-size: 11px;
  }
  @keyframes marquee { to { transform: translateX(-50%); } }

  /* ---------- футер ---------- */
  .footer {
    margin-top: 26px;
    text-align: center;
  }
  .hours {
    font-size: 12.5px;
    font-weight: 700;
    letter-spacing: 1.6px;
    text-transform: uppercase;
    color: var(--ink-dim);
  }
  .hours b {
    color: var(--fx-bright);
    font-weight: 800;
  }
  .made {
    margin-top: 14px;
    font-size: 13.5px;
    font-weight: 600;
    color: var(--ink-faint);
  }

  /* ---------- вход: стаггер ---------- */
  .reveal {
    opacity: 0;
    transform: translateY(22px);
    animation: rise 0.9s var(--ease-out) forwards;
    animation-delay: calc(var(--i, 0) * 90ms);
  }
  @keyframes rise {
    to { opacity: 1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce) {
    .aurora, .grain, .emblem-ring, .marquee-track, .iridescent,
    .floaty, .emblem, .title, .link-card::after, .link-card.featured,
    .divider .gem { animation: none; }
    .reveal { animation-duration: 0.01s; animation-delay: 0s; }
    .link-card, .link-arrow, .chip, .lang-btn { transition: none; }
  }
</style>
</head>
<body>

<div class="backdrop" aria-hidden="true">
  <div class="iridescent"></div>
  <div class="aurora aurora-1"></div>
  <div class="aurora aurora-2"></div>
  <div class="aurora aurora-3"></div>
  <div class="vignette"></div>
  <div class="grain"></div>
</div>

<!-- Летающие товары (заполняется скриптом) -->
<div class="floaties" id="floaties" aria-hidden="true"></div>

<main class="page">

  <div class="lang-switch reveal" style="--i:0" id="lang-switch">
    <button class="lang-btn" data-lang="uz">UZ</button>
    <button class="lang-btn" data-lang="ru">RU</button>
    <button class="lang-btn" data-lang="en">EN</button>
  </div>

  <div class="emblem reveal" style="--i:0">
    <svg class="emblem-ring" viewBox="0 0 148 148" aria-hidden="true">
      <defs>
        <path id="ring-path" d="M 74,74 m -62,0 a 62,62 0 1,1 124,0 a 62,62 0 1,1 -124,0"/>
      </defs>
      <text>
        <textPath href="#ring-path">STILIST STORE&#160;&#160;•&#160;&#160;TOSHKENT&#160;&#160;•&#160;&#160;MANIKYUR&#160;&#160;•&#160;&#160;PEDIKYUR&#160;&#160;•&#160;&#160;</textPath>
      </text>
    </svg>
    <div class="emblem-core"><span>S</span></div>
  </div>

  <h1 class="title reveal" style="--i:1"><span class="word">Stilist</span><span class="word">Store</span></h1>
  <p class="subtitle reveal" style="--i:2" id="subtitle"></p>
  <p class="tagline reveal" style="--i:3" id="tagline"></p>
  <p class="delivery reveal" style="--i:4" id="delivery"></p>

  <div class="divider reveal" style="--i:5"><span class="gem"></span></div>

  <!-- Основные ссылки: заполняются из CONFIG -->
  <ul class="links" id="links"></ul>

  <!-- Филиалы: заполняются из CONFIG -->
  <h2 class="section-title reveal" style="--i:10" id="branches-title"></h2>
  <ul class="branches" id="branches"></ul>

  <div class="marquee reveal" style="--i:13" aria-hidden="true">
    <div class="marquee-track">
      <span class="marquee-text"></span>
      <span class="marquee-text"></span>
    </div>
  </div>

  <footer class="footer">
    <p class="hours reveal" style="--i:14" id="hours"></p>
    <p class="made reveal" style="--i:15" id="made"></p>
  </footer>

</main>

<script>
/* Рендер страницы из CONFIG — этот код трогать не нужно */
(function () {
  const ICONS = {
    instagram: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2.5" y="2.5" width="19" height="19" rx="5.5"/><circle cx="12" cy="12" r="4.3"/><circle cx="17.6" cy="6.4" r="1.1" fill="currentColor" stroke="none"/></svg>',
    telegram: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 3.5 2.9 10.7c-1 .4-1 1.5.1 1.8l4.6 1.4 1.7 5.3c.3.9 1.3 1.1 1.9.4l2.5-2.7 4.8 3.5c.8.6 1.9.2 2.1-.8l3-14.2c.2-1.1-.8-1.9-2.1-1.9z" transform="scale(0.92) translate(1,1)"/><path d="M8 14l9.5-8.5"/></svg>',
    catalog: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2.5h12a1.5 1.5 0 0 1 1.5 1.5v16a1.5 1.5 0 0 1-1.5 1.5H6A1.5 1.5 0 0 1 4.5 20V4A1.5 1.5 0 0 1 6 2.5z"/><path d="M8.5 7h7M8.5 11h7M8.5 15h4"/></svg>',
    pin: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21.5s7-6.2 7-11.5a7 7 0 1 0-14 0c0 5.3 7 11.5 7 11.5z"/><circle cx="12" cy="9.8" r="2.6"/></svg>',
    phone: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16.5v3a2 2 0 0 1-2.2 2A19.5 19.5 0 0 1 2.5 5.2 2 2 0 0 1 4.5 3h3a2 2 0 0 1 2 1.7c.13.96.37 1.9.7 2.8a2 2 0 0 1-.45 2.1L8.6 10.75a16 16 0 0 0 4.65 4.65l1.15-1.15a2 2 0 0 1 2.1-.45c.9.33 1.84.57 2.8.7a2 2 0 0 1 1.7 2z"/></svg>',
    arrow: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>',
    link: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13.5a5 5 0 0 0 7.1 0l3-3a5 5 0 0 0-7.1-7.1l-1.7 1.7"/><path d="M14 10.5a5 5 0 0 0-7.1 0l-3 3a5 5 0 0 0 7.1 7.1l1.7-1.7"/></svg>',
    heart: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20.5C4.5 15.5 2 11.5 3.5 8 5 4.7 9 4.2 12 7.5 15 4.2 19 4.7 20.5 8 22 11.5 19.5 15.5 12 20.5z"/></svg>',
    star: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.5l2.9 6 6.6 1-4.8 4.6 1.2 6.5L12 17.5l-5.9 3.1 1.2-6.5L2.5 9.5l6.6-1z"/></svg>',
    cart: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="20" r="1.5"/><circle cx="18" cy="20" r="1.5"/><path d="M2.5 3.5h3l2.5 12h11l2.5-9h-15"/></svg>',
  };

  /* --- рисованные товары в фирменном стиле (запасной вариант) --- */
  const PRODUCT_SVGS = {
    bottle:
      '<svg viewBox="0 0 64 100" fill="none">' +
      '<defs><linearGradient id="pg1" x1="0" y1="0" x2="1" y2="1">' +
      '<stop offset="0" stop-color="#ff8ac4"/><stop offset="1" stop-color="#a91464"/></linearGradient></defs>' +
      '<rect x="24" y="4" width="16" height="20" rx="4" fill="#3d0b2c" stroke="#ff8ac4" stroke-opacity="0.5"/>' +
      '<rect x="27" y="24" width="10" height="8" fill="#5c1242"/>' +
      '<rect x="12" y="32" width="40" height="62" rx="14" fill="url(#pg1)"/>' +
      '<ellipse cx="24" cy="48" rx="6" ry="12" fill="#ffffff" opacity="0.35"/></svg>',
    file:
      '<svg viewBox="0 0 28 110" fill="none">' +
      '<defs><linearGradient id="pg2" x1="0" y1="0" x2="0" y2="1">' +
      '<stop offset="0" stop-color="#ffb8da"/><stop offset="1" stop-color="#ec4b9d"/></linearGradient></defs>' +
      '<rect x="4" y="4" width="20" height="102" rx="10" fill="url(#pg2)"/>' +
      '<rect x="8" y="10" width="4" height="90" rx="2" fill="#ffffff" opacity="0.3"/></svg>',
    drop:
      '<svg viewBox="0 0 60 74" fill="none">' +
      '<defs><linearGradient id="pg3" x1="0" y1="0" x2="1" y2="1">' +
      '<stop offset="0" stop-color="#ff8ac4"/><stop offset="1" stop-color="#c22579"/></linearGradient></defs>' +
      '<path d="M30 4 C40 24, 56 36, 56 50 a26 24 0 1 1 -52 0 C4 36, 20 24, 30 4z" fill="url(#pg3)"/>' +
      '<ellipse cx="21" cy="46" rx="5" ry="9" fill="#ffffff" opacity="0.4"/></svg>',
    heart:
      '<svg viewBox="0 0 64 58" fill="none">' +
      '<defs><linearGradient id="pg4" x1="0" y1="0" x2="1" y2="1">' +
      '<stop offset="0" stop-color="#ff8ac4"/><stop offset="1" stop-color="#a91464"/></linearGradient></defs>' +
      '<path d="M32 56 C10 40, 2 28, 6 16 C10 5, 24 3, 32 14 C40 3, 54 5, 58 16 C62 28, 54 40, 32 56z" fill="url(#pg4)"/>' +
      '<ellipse cx="20" cy="19" rx="5" ry="7" fill="#ffffff" opacity="0.35" transform="rotate(-25 20 19)"/></svg>',
    sparkle:
      '<svg viewBox="0 0 48 48" fill="none">' +
      '<path d="M24 2 L28 20 L46 24 L28 28 L24 46 L20 28 L2 24 L20 20 Z" fill="#ffc2de"/></svg>',
  };

  /* --- расстановка летающих элементов: позиции по краям, центр свободен --- */
  const FLOATY_SLOTS = [
    { kind: 'bottle',  x: '2%',  y: '4%',  size: 40, dur: 9,  delay: 0,   rot: -14 },
    { kind: 'sparkle', x: '22%', y: '2%',  size: 22, dur: 14, delay: 1,   rot: 0   },
    { kind: 'drop',    x: '82%', y: '3%',  size: 36, dur: 8,  delay: 0.5, rot: 10  },
    { kind: 'file',    x: '88%', y: '18%', size: 42, dur: 10, delay: 1.2, rot: 22  },
    { kind: 'heart',   x: '1%',  y: '21%', size: 38, dur: 7,  delay: 0.8, rot: -8  },
    { kind: 'bottle',  x: '86%', y: '35%', size: 38, dur: 11, delay: 0.4, rot: 16  },
    { kind: 'drop',    x: '3%',  y: '39%', size: 40, dur: 9,  delay: 1.6, rot: -12 },
    { kind: 'sparkle', x: '91%', y: '50%', size: 18, dur: 12, delay: 0,   rot: 0   },
    { kind: 'heart',   x: '2%',  y: '57%', size: 38, dur: 8,  delay: 1,   rot: 12  },
    { kind: 'bottle',  x: '87%', y: '62%', size: 40, dur: 10, delay: 0.6, rot: -10 },
    { kind: 'drop',    x: '4%',  y: '75%', size: 36, dur: 9,  delay: 1.4, rot: 8   },
    { kind: 'sparkle', x: '14%', y: '92%', size: 24, dur: 15, delay: 2,   rot: 0   },
    { kind: 'file',    x: '85%', y: '80%', size: 42, dur: 11, delay: 0.9, rot: -18 },
    { kind: 'heart',   x: '80%', y: '94%', size: 36, dur: 8,  delay: 1.8, rot: 14  },
  ];

  /* --- языки --- */
  const LANGS = ['uz', 'ru', 'en'];
  let lang = 'uz';
  try {
    const saved = localStorage.getItem('ss-lang');
    if (LANGS.indexOf(saved) !== -1) lang = saved;
  } catch (e) {}

  // t() — берёт текст на текущем языке; обычная строка работает для всех языков
  function t(v) {
    if (typeof v === 'string') return v;
    return v[lang] || v.uz || v.ru || v.en || '';
  }

  /* --- летающие товары (рисуются один раз) --- */
  const floaties = document.getElementById('floaties');
  const photos = CONFIG.productPhotos || [];
  let photoIdx = 0;
  FLOATY_SLOTS.forEach(function (s) {
    const el = document.createElement('div');
    el.className = 'floaty' + (s.kind === 'sparkle' ? ' sparkle' : '');
    // фото товаров крупнее рисованных значков;
    // на узких экранах — меньше, чтобы не перекрывать кнопки
    const isNarrow = window.matchMedia('(max-width: 700px)').matches;
    const mult = isNarrow ? 1.7 : 3.4;
    const size = (photos.length > 0 && s.kind !== 'sparkle') ? Math.round(s.size * mult) : s.size;
    el.style.left = s.x;
    el.style.top = s.y;
    el.style.width = size + 'px';
    el.style.height = size + 'px';
    el.style.setProperty('--dur', s.dur + 's');
    el.style.setProperty('--delay', s.delay + 's');
    el.style.setProperty('--rot', s.rot + 'deg');
    if (photos.length > 0 && s.kind !== 'sparkle') {
      el.innerHTML = '<img src="' + photos[photoIdx % photos.length] + '" alt="">';
      photoIdx++;
    } else {
      el.innerHTML = PRODUCT_SVGS[s.kind];
    }
    floaties.appendChild(el);
  });

  /* --- рендер текстов и списков на выбранном языке --- */
  function renderAll() {
    document.documentElement.lang = lang;
    document.getElementById('subtitle').textContent = t(CONFIG.texts.subtitle);
    document.getElementById('tagline').textContent = t(CONFIG.texts.tagline);
    document.getElementById('delivery').textContent = t(CONFIG.texts.delivery);
    document.getElementById('branches-title').textContent = t(CONFIG.texts.branchesTitle);
    document.getElementById('made').textContent = t(CONFIG.texts.made);
    document.getElementById('hours').innerHTML =
      t(CONFIG.workingHours).replace(/(\d{2}:\d{2}\s*—\s*\d{2}:\d{2})/, '<b>$1</b>');
    document.querySelectorAll('.marquee-text').forEach(function (el) {
      el.innerHTML = t(CONFIG.texts.marquee);
    });

    // активная кнопка языка
    document.querySelectorAll('.lang-btn').forEach(function (btn) {
      btn.classList.toggle('active', btn.dataset.lang === lang);
    });

    // кнопки-ссылки
    const links = document.getElementById('links');
    links.innerHTML = '';
    (CONFIG.buttons || []).forEach(function (item, i) {
      const li = document.createElement('li');
      li.className = 'reveal';
      li.style.setProperty('--i', 6 + i);
      const sub = item.sub ? '<span class="link-sub">' + t(item.sub) + '</span>' : '';
      li.innerHTML =
        '<a class="link-card' + (item.style === 'pink' ? ' featured' : '') + '" href="' + item.url + '" target="_blank" rel="noopener">' +
          '<span class="link-icon" aria-hidden="true">' + (ICONS[item.icon] || ICONS.link) + '</span>' +
          '<span class="link-text">' +
            '<span class="link-title">' + t(item.title) + '</span>' +
            sub +
          '</span>' +
          '<span class="link-arrow" aria-hidden="true">' + ICONS.arrow + '</span>' +
        '</a>';
      links.appendChild(li);
    });

    // филиалы
    const branches = document.getElementById('branches');
    branches.innerHTML = '';
    (CONFIG.branches || []).forEach(function (b, i) {
      const li = document.createElement('li');
      li.className = 'reveal';
      li.style.setProperty('--i', 11 + i);
      const phones = b.phones.map(function (p) {
        return '<a class="chip chip-phone" href="tel:' + p.replace(/[^+\d]/g, '') + '">' + ICONS.phone + p + '</a>';
      }).join('');
      li.innerHTML =
        '<div class="branch-card' + (b.featured ? ' featured' : '') + '">' +
          '<div class="branch-head">' +
            '<span class="branch-pin" aria-hidden="true">' + ICONS.pin + '</span>' +
            '<div><div class="branch-name">' + t(b.name) + '</div>' +
            '<div class="branch-address">' + t(b.address) + '</div></div>' +
          '</div>' +
          '<div class="branch-actions">' +
            '<a class="chip chip-map" href="' + b.mapUrl + '" target="_blank" rel="noopener">' + ICONS.pin + t(CONFIG.texts.mapChip) + '</a>' +
            phones +
          '</div>' +
        '</div>';
      branches.appendChild(li);
    });
  }

  /* --- переключатель языка --- */
  document.getElementById('lang-switch').addEventListener('click', function (e) {
    const btn = e.target.closest('.lang-btn');
    if (!btn) return;
    lang = btn.dataset.lang;
    try { localStorage.setItem('ss-lang', lang); } catch (err) {}
    renderAll();
  });

  renderAll();
})();
</script>

</body>
</html>
